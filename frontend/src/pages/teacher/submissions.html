<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Submissions — IELTS Speaking AI</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/src/shared/styles/base.css">
  <link rel="stylesheet" href="/src/shared/styles/teacher.css">
</head>
<body>

<!-- ── NAVBAR ── -->
<nav class="navbar">
  <div class="nav-left">
    <div class="nav-logo">
      <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2a5 5 0 015 5v2H7V7a5 5 0 015-5z"/>
        <rect x="3" y="9" width="18" height="13" rx="2"/>
        <circle cx="12" cy="15.5" r="1.5" fill="white" stroke="none"/>
      </svg>
    </div>
    <span class="nav-brand">IELTS Speaking AI</span>
  </div>
  <div class="nav-links">
    <a class="nav-link" href="/teacher-dashboard.html">Dashboard</a>
    <a class="nav-link active" href="/teacher-submissions.html">Submissions</a>
    <a class="nav-link" href="/teacher-review.html">Review queue <span class="nav-badge" id="nav-pending-count"></span></a>
    <a class="nav-link" href="/teacher-students.html">My students</a>
  </div>
  <div class="nav-right">
    <span class="nav-role-badge">Teacher</span>
    <div class="nav-avatar" id="nav-avatar">TK</div>
    <span class="nav-name" id="nav-name">Teacher</span>
    <button class="nav-logout" onclick="Auth.logout()" title="Logout">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/>
        <polyline points="16 17 21 12 16 7"/>
        <line x1="21" y1="12" x2="9" y2="12"/>
      </svg>
    </button>
  </div>
</nav>

<div class="page">
  <div class="page-header" style="display:flex;align-items:center;justify-content:space-between;">
    <div>
      <h1 class="page-title">Student Submissions</h1>
      <p class="page-sub" id="submissions-count">Loading...</p>
    </div>
    <div style="display:flex;gap:8px;">
      <span class="badge badge-pending" style="padding:6px 14px;font-size:12px;" id="stat-pending"></span>
      <span class="badge badge-done" style="padding:6px 14px;font-size:12px;" id="stat-done"></span>
    </div>
  </div>

  <!-- Filters -->
  <div class="filter-bar">
    <div class="search-input-wrap">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input type="text" class="search-input" id="search-input" placeholder="Search by student name or question…" oninput="applyFilters()">
    </div>
    <div class="filter-tabs">
      <button class="ftab active" data-filter="all" onclick="setStatusFilter('all', this)">All</button>
      <button class="ftab" data-filter="pending" onclick="setStatusFilter('pending', this)">Not Evaluated</button>
      <button class="ftab" data-filter="evaluated" onclick="setStatusFilter('evaluated', this)">Evaluated</button>
    </div>
    <button class="btn btn-outline btn-sm" onclick="exportCSV()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
        <polyline points="7 10 12 15 17 10"/>
        <line x1="12" y1="15" x2="12" y2="3"/>
      </svg>
      Export
    </button>
  </div>

  <!-- Table -->
  <div class="card">
    <table class="data-table" id="submissions-table">
      <thead>
        <tr>
          <th>STUDENT NAME</th>
          <th>QUESTION</th>
          <th>PART</th>
          <th>
            <span style="cursor:pointer;" onclick="toggleSort()">SUBMISSION DATE <span id="sort-icon">↓</span></span>
          </th>
          <th>SCORE</th>
          <th>STATUS</th>
          <th>ACTIONS</th>
        </tr>
      </thead>
      <tbody id="submissions-tbody">
        <tr><td colspan="7" class="empty-state">Loading submissions...</td></tr>
      </tbody>
    </table>
    <div class="pagination" id="pagination">
      <span id="pagination-info">Showing 0 results</span>
      <div class="pagination-btns" id="pagination-btns"></div>
    </div>
  </div>
</div>

<div class="toast hidden" id="toast"></div>

<script src="/src/shared/utils/auth.js"></script>
<script src="/src/shared/utils/helpers.js"></script>
<script src="/src/pages/teacher/submissions.js"></script>
</body>
</html>
