services:
  - type: web
    name: ielts-speaking-backend
    env: python
    plan: free
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ielts-speaking-db
          property: connectionString
      - key: PDF_SERVICE_URL
        fromService:
          name: ielts-pdf-service
          type: web
          property: host
      - key: GEMINI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: SECRET_KEY
        generateValue: true

  - type: web
    name: ielts-pdf-service
    env: docker
    plan: free
    dockerfilePath: ./pdf-service/Dockerfile
    dockerContext: ./pdf-service

databases:
  - name: ielts-speaking-db
    plan: free
